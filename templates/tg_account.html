<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳戶設置 - SEPA StockLab</title>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js" type="module"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #e8eaf6;
            --accent: #58a6ff;
        }
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0;
            margin: 0;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.5rem;
        }
        .header h1 {
            font-size: 1.3rem;
            margin: 0;
            flex: 1;
        }
        .container {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .section-title {
            background: var(--border);
            padding: 0.75rem 1rem;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .section-content {
            padding: 1rem;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-row:last-child {
            border-bottom: none;
        }
        .setting-label {
            font-weight: 500;
        }
        .setting-value {
            color: var(--accent);
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 0.75rem;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 0.25rem;
        }
        .input-group input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.75rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .btn-primary:hover {
            background: #1f6feb;
            cursor: pointer;
        }
        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: var(--border);
            opacity: 0.8;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; overflow-x: auto; overflow-y: hidden;
            padding: 6px 4px 14px; z-index: 50;
            scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s;
            text-decoration: none; color: #8b949e;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0; min-width: 52px;
        }
        .nav-item:active { transform: scale(0.88); }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-icon  { font-size: 18px; line-height: 1; }
        .nav-label { font-size: 9px; font-weight: 600; white-space: nowrap; }
        .nav-item.trade { color: #ffd54f; }
        .nav-item.trade:hover, .nav-item.trade:active { color: #ffe082; }

        .container {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/tg/menu" title="返回菜單">&larr;</a>
        <h1>👤 帳戶設置</h1>
    </div>
    
    <div class="container">
        <div id="content" class="loading">
            <div class="spinner"></div>
            <p>加載中...</p>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function loadAccount() {
            try {
                const response = await fetch('/api/account-settings');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (!data.ok) {
                    document.getElementById('content').innerHTML = `<p>❌ ${data.error}</p>`;
                    return;
                }
                
                const settings = data.settings || {};
                
                const html = `
                    <div class="section">
                        <div class="section-title">💰 帳戶參數</div>
                        <div class="section-content">
                            <div class="setting-row">
                                <span class="setting-label">帳戶規模</span>
                                <span class="setting-value">$${(settings.account_size || 0).toFixed(0)}</span>
                            </div>
                            <div class="setting-row">
                                <span class="setting-label">每筆風險</span>
                                <span class="setting-value">${(settings.max_risk_per_trade || 1.5).toFixed(1)}%</span>
                            </div>
                            <div class="setting-row">
                                <span class="setting-label">最大倉位</span>
                                <span class="setting-value">${(settings.max_position_pct || 20).toFixed(0)}%</span>
                            </div>
                            <div class="setting-row">
                                <span class="setting-label">最大持倉數</span>
                                <span class="setting-value">${settings.max_positions || 6}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">🎯 風險管理</div>
                        <div class="section-content">
                            <div class="setting-row">
                                <span class="setting-label">最大止損</span>
                                <span class="setting-value">${(settings.max_stop_loss_pct || 8).toFixed(1)}%</span>
                            </div>
                            <div class="setting-row">
                                <span class="setting-label">最小風險回報比</span>
                                <span class="setting-value">${(settings.min_risk_reward || 2).toFixed(1)}:1</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">📊 分析偏好</div>
                        <div class="section-content">
                            <div class="setting-row">
                                <span class="setting-label">預設策略</span>
                                <span class="setting-value">${settings.default_strategy || 'SEPA'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">ℹ️ 關於</div>
                        <div class="section-content">
                            <div class="setting-row">
                                <span class="setting-label">版本</span>
                                <span class="setting-value">1.0</span>
                            </div>
                            <div class="setting-row">
                                <span class="setting-label">Backend</span>
                                <span class="setting-value">Flask</span>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('content').innerHTML = html;
            } catch (e) {
                document.getElementById('content').innerHTML = `<p>❌ 錯誤：${e.message}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAccount);
    </script>

    {% set tg_active_page = 'account' %}
    {% include "_tg_bottom_nav.html" %}
</body>
</html>
