<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析 - SEPA StockLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #e8eaf6;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .header h1 {
            font-size: 1.3rem;
            margin: 0;
            flex: 1;
        }
        
        .header-meta {
            font-size: 0.85rem;
            color: #b0b0b0;
        }
        
        .content {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
            min-height: calc(100vh - 70px);
            padding-bottom: 100px;
        }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; overflow-x: auto; overflow-y: hidden;
            padding: 6px 4px 14px; z-index: 50;
            scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s;
            text-decoration: none; color: #8b949e;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0; min-width: 52px;
        }
        .nav-item:active { transform: scale(0.88); }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-icon  { font-size: 18px; line-height: 1; }
        .nav-label { font-size: 9px; font-weight: 600; white-space: nowrap; }
        
        .loading {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .card-body {
            padding: 1rem;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-weight: 500;
            color: var(--text);
        }
        
        .stat-value {
            color: var(--accent);
            font-weight: 600;
        }
        
        .recommendation {
            padding: 1rem;
            border-radius: 0.375rem;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        .recommendation.buy {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }
        
        .recommendation.watch {
            background: rgba(210, 153, 34, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
        }
        
        .recommendation.avoid {
            background: rgba(248, 81, 73, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        
        .dimension-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .dimension-row:last-child {
            border-bottom: none;
        }
        
        .dimension-label {
            font-weight: 500;
            flex: 1;
            color: var(--text);
        }
        
        .dimension-score {
            padding: 0.25rem 0.75rem;
            background: var(--border);
            border-radius: 0.25rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 60px;
            text-align: right;
        }
        
        .stars {
            font-size: 1.2rem;
            color: var(--warning);
            margin: 0.5rem 0;
        }
        
        .chart-container {
            position: relative;
            height: 200px;
            margin: 1rem 0;
        }
        
        .error-msg {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1rem;
            border-radius: 0.375rem;
            margin: 1rem 0;
        }
        
        .back-button {
            background: var(--border);
            color: var(--text);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            margin-top: 1rem;
            width: 100%;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .back-button:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #loadingOverlay.active {
            opacity: 1; pointer-events: all;
        }
        #loadingText {
            color: var(--text); font-size: 13px; margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <dotlottie-player src="/assets/loading.lottie" autoplay loop style="width:88px;height:88px;"></dotlottie-player>
        <div id="loadingText">分析中...</div>
    </div>

    <div class="header">
        <a onclick="goBack()" title="返回菜單">&larr;</a>
        <div>
            <h1>📊 股票分析</h1>
            <div class="header-meta" id="headerMeta">加載中...</div>
        </div>
    </div>
    
    <div class="content">
        <!-- Loading State -->
        <div id="loading" class="loading active">
            <div class="spinner"></div>
            <p>分析中... 這可能需要 30-60 秒</p>
        </div>
        
        <!-- Result State -->
        <div id="result" style="display: none;">
            <!-- Recommendation -->
            <div id="recommendationBox"></div>
            
            <!-- Basic Info -->
            <div class="card">
                <div class="card-header">📈 基本信息</div>
                <div class="card-body">
                    <div class="stat-row">
                        <span class="stat-label">股票代碼</span>
                        <span class="stat-value" id="baseTicker">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">公司名稱</span>
                        <span class="stat-value" id="baseCompany" style="font-size: 0.9rem;">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">當前價格</span>
                        <span class="stat-value" id="basePrice">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">評分</span>
                        <span class="stat-value" id="baseScore">-</span>
                    </div>
                    <div class="stat-row" id="rsRankRow" style="display:none;">
                        <span class="stat-label">RS 排名</span>
                        <span class="stat-value" id="rsRank">-</span>
                    </div>
                </div>
            </div>
            
            <!-- Dimensions (QM/ML) -->
            <div id="dimensionsCard" class="card" style="display: none;">
                <div class="card-header">⭐ 評級維度</div>
                <div class="card-body" id="dimensionsContent"></div>
            </div>
            
            <!-- SEPA Recommendation (SEPA only) -->
            <div id="sepaBasisCard" class="card" style="display: none;">
                <div class="card-header">💡 分析基礎</div>
                <div class="card-body" id="sepaBasisContent"></div>
            </div>
            
            <!-- Trade Plan (QM/ML) -->
            <div id="tradePlanCard" class="card" style="display: none;">
                <div class="card-header">🎯 交易計劃</div>
                <div class="card-body" id="tradePlanContent"></div>
            </div>
            
            <!-- Chart -->
            <div id="chartCard" class="card" style="display: none;">
                <div class="card-header">📊 30 天價格走勢</div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Additional Info -->
            <div id="additionalCard" class="card" style="display: none;">
                <div class="card-header">ℹ️ 額外信息</div>
                <div class="card-body" id="additionalContent"></div>
            </div>
            
            <!-- Error Display -->
            <div id="errorBox" style="display: none;"></div>
            
            <!-- Back Button -->
            <button class="back-button" onclick="goBack()">← 返回菜單</button>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // 從 URL 參數獲取 ticker 和 strategy
        const urlParams = new URLSearchParams(window.location.search);
        const ticker = '{{ ticker }}' || urlParams.get('ticker') || 'NVDA';
        const strategy = '{{ strategy }}' || urlParams.get('strategy') || 'SEPA';
        
        let analysisData = null;
        let priceChart = null;
        
        async function loadAnalysis() {
            try {
                document.getElementById('headerMeta').textContent = `${strategy} 分析中...`;
                
                const response = await fetch(`/api/tg/analyze/${ticker}?strategy=${strategy}`);
                
                if (!response.ok) {
                    showError(`分析失敗 (HTTP ${response.status})`);
                    return;
                }
                
                const data = await response.json();
                
                if (!data.ok) {
                    showError(data.error || '分析失敗');
                    return;
                }
                
                analysisData = data.result;
                renderResult();
            } catch (e) {
                showError(`錯誤: ${e.message}`);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }
        
        function renderResult() {
            document.getElementById('result').style.display = 'block';
            document.getElementById('headerMeta').textContent = `${ticker} | ${strategy}`;
            
            if (strategy === 'SEPA') {
                renderSEPA();
            } else if (strategy === 'QM') {
                renderQM();
            } else if (strategy === 'ML') {
                renderML();
            }
        }
        
        function renderSEPA() {
            const r = analysisData;
            
            // Recommendation
            const recBox = document.getElementById('recommendationBox');
            const rec = (r.recommendation || 'WATCH').toUpperCase();
            const recClass = rec === 'BUY' ? 'buy' : rec === 'AVOID' ? 'avoid' : 'watch';
            recBox.innerHTML = `<div class="recommendation ${recClass}">${rec}</div>`;
            
            // Basic info
            document.getElementById('baseTicker').textContent = r.ticker || '-';
            document.getElementById('baseCompany').textContent = r.company || '-';
            document.getElementById('basePrice').textContent = `$${(r.price || 0).toFixed(2)}`;
            document.getElementById('baseScore').textContent = `${(r.sepa_score || 0).toFixed(1)}/100`;
            
            // RS Rank
            if (r.rs_rank) {
                document.getElementById('rsRankRow').style.display = 'block';
                document.getElementById('rsRank').textContent = `${(r.rs_rank || 0).toFixed(0)}%`;
            }
            
            // SEPA basis
            const basisCard = document.getElementById('sepaBasisCard');
            const basisContent = document.getElementById('sepaBasisContent');
            const reasons = r.reasons || [];
            
            if (reasons.length > 0) {
                basisCard.style.display = 'block';
                basisContent.innerHTML = reasons.map(reason => 
                    `<div class="stat-row"><span>✓ ${reason}</span></div>`
                ).join('');
            }
            
            // Price chart if position data exists
            if (r.position) {
                renderChart();
            }
        }
        
        function renderQM() {
            const r = analysisData;
            
            // Star rating
            const rec = r.recommendation || 'WATCH';
            const recClass = rec.includes('BUY') || rec.includes('Strong') ? 'buy' : 
                             rec.includes('AVOID') ? 'avoid' : 'watch';
            const starBox = document.getElementById('recommendationBox');
            const stars = '★'.repeat(Math.round(r.star_rating || 0)) + '☆'.repeat(5 - Math.round(r.star_rating || 0));
            starBox.innerHTML = `
                <div class="recommendation ${recClass}">
                    ${rec}<br>
                    <div class="stars">${stars}</div>
                </div>
            `;
            
            // Basic info
            document.getElementById('baseTicker').textContent = r.ticker || '-';
            document.getElementById('baseCompany').textContent = r.company || '-';
            document.getElementById('basePrice').textContent = `$${(r.close || 0).toFixed(2)}`;
            document.getElementById('baseScore').textContent = `${(r.star_rating || 0).toFixed(1)}/5 ★`;
            
            // Dimensions
            const dimCard = document.getElementById('dimensionsCard');
            const dimContent = document.getElementById('dimensionsContent');
            const dims = r.dimensions || {};
            const dimLabels = {
                'momentum': '動量質量',
                'adr_level': 'ADR 水平',
                'consolidation': '盤整質量',
                'ma_alignment': 'MA 對齐',
                'stock_type': '股票類型',
                'market_timing': '市場時機'
            };
            
            let dimHtml = '';
            for (const [key, val] of Object.entries(dims)) {
                const label = dimLabels[key] || key;
                dimHtml += `
                    <div class="dimension-row">
                        <span class="dimension-label">${label}</span>
                        <span class="dimension-score">${(val || 0).toFixed(1)}</span>
                    </div>
                `;
            }
            
            if (dimHtml) {
                dimCard.style.display = 'block';
                dimContent.innerHTML = dimHtml;
            }
            
            // Trade plan
            const tradePlanCard = document.getElementById('tradePlanCard');
            const tradePlanContent = document.getElementById('tradePlanContent');
            if (r.trade_plan) {
                tradePlanCard.style.display = 'block';
                let planHtml = '';
                if (typeof r.trade_plan === 'object') {
                    for (const [key, val] of Object.entries(r.trade_plan)) {
                        planHtml += `<div class="stat-row"><span class="stat-label">${key}</span><span class="stat-value">${val}</span></div>`;
                    }
                } else {
                    planHtml = `<div class="stat-row"><span>${r.trade_plan}</span></div>`;
                }
                tradePlanContent.innerHTML = planHtml;
            }
            
            // Additional info
            const addCard = document.getElementById('additionalCard');
            const addContent = document.getElementById('additionalContent');
            let addHtml = '';
            
            if (r.adr) {
                addHtml += `<div class="stat-row"><span class="stat-label">ADR</span><span class="stat-value">${(r.adr || 0).toFixed(2)}%</span></div>`;
            }
            if (r.setup_type) {
                addHtml += `<div class="stat-row"><span class="stat-label">Setup 類型</span><span class="stat-value">${r.setup_type}</span></div>`;
            }
            
            if (addHtml) {
                addCard.style.display = 'block';
                addContent.innerHTML = addHtml;
            }
            
            // Price chart
            renderChart();
        }
        
        function renderML() {
            const r = analysisData;
            
            // Star rating
            const rec = r.recommendation || 'WATCH';
            const recClass = rec.includes('BUY') || rec.includes('Strong') ? 'buy' : 
                             rec.includes('AVOID') ? 'avoid' : 'watch';
            const starBox = document.getElementById('recommendationBox');
            const stars = '★'.repeat(Math.round(r.star_rating || 0)) + '☆'.repeat(7 - Math.round(r.star_rating || 0));
            starBox.innerHTML = `
                <div class="recommendation ${recClass}">
                    ${rec}<br>
                    <div class="stars">${stars}</div>
                </div>
            `;
            
            // Basic info
            document.getElementById('baseTicker').textContent = r.ticker || '-';
            document.getElementById('baseCompany').textContent = r.company || '-';
            document.getElementById('basePrice').textContent = `$${(r.close || 0).toFixed(2)}`;
            document.getElementById('baseScore').textContent = `${(r.star_rating || 0).toFixed(1)}/7 ★`;
            
            // Dimensions (7 dimensions)
            const dimCard = document.getElementById('dimensionsCard');
            const dimContent = document.getElementById('dimensionsContent');
            const dims = r.dimensions || {};
            const dimLabels = {
                'ema_structure': 'EMA 結構',
                'pullback_quality': '回檔質量',
                'avwap_confluence': 'AVWAP 匯聚',
                'volume_pattern': '成交量模式',
                'risk_reward': '風險回報',
                'relative_strength': '相對強度',
                'market_environment': '市場環境'
            };
            
            let dimHtml = '';
            for (const [key, val] of Object.entries(dims)) {
                const label = dimLabels[key] || key;
                dimHtml += `
                    <div class="dimension-row">
                        <span class="dimension-label">${label}</span>
                        <span class="dimension-score">${(val || 0).toFixed(1)}</span>
                    </div>
                `;
            }
            
            if (dimHtml) {
                dimCard.style.display = 'block';
                dimContent.innerHTML = dimHtml;
            }
            
            // Trade plan
            const tradePlanCard = document.getElementById('tradePlanCard');
            const tradePlanContent = document.getElementById('tradePlanContent');
            if (r.trade_plan) {
                tradePlanCard.style.display = 'block';
                let planHtml = '';
                if (typeof r.trade_plan === 'object') {
                    for (const [key, val] of Object.entries(r.trade_plan)) {
                        planHtml += `<div class="stat-row"><span class="stat-label">${key}</span><span class="stat-value">${val}</span></div>`;
                    }
                } else {
                    planHtml = `<div class="stat-row"><span>${r.trade_plan}</span></div>`;
                }
                tradePlanContent.innerHTML = planHtml;
            }
            
            // Additional info
            const addCard = document.getElementById('additionalCard');
            const addContent = document.getElementById('additionalContent');
            let addHtml = '';
            
            if (r.adr) {
                addHtml += `<div class="stat-row"><span class="stat-label">ADR</span><span class="stat-value">${(r.adr || 0).toFixed(2)}%</span></div>`;
            }
            if (r.setup_type) {
                addHtml += `<div class="stat-row"><span class="stat-label">Setup 類型</span><span class="stat-value">${r.setup_type}</span></div>`;
            }
            
            if (addHtml) {
                addCard.style.display = 'block';
                addContent.innerHTML = addHtml;
            }
            
            // Price chart
            renderChart();
        }
        
        function renderChart() {
            const chartCard = document.getElementById('chartCard');
            chartCard.style.display = 'block';
            
            // Load chart data from API
            fetch(`/api/chart/enriched/${ticker}`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.candles && data.candles.length > 0) {
                        drawChart(data.candles);
                    }
                })
                .catch(e => console.log('Chart load skipped:', e.message));
        }
        
        function drawChart(candles) {
            const ctx = document.getElementById('priceChart');
            if (!ctx) return;
            
            // Take last 30 candles
            const chartData = candles.slice(-30);
            
            if (priceChart) priceChart.destroy();
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(c => {
                        const d = new Date(c.time * 1000);
                        return (d.getMonth() + 1) + '/' + d.getDate();
                    }),
                    datasets: [{
                        label: 'Close Price',
                        data: chartData.map(c => c.close),
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        tension: 0.3,
                        fill: true,
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {display: false}},
                    scales: {
                        y: {
                            ticks: {color: '#b0b0b0', font: {size: 10}},
                            grid: {color: '#30363d', drawBorder: false},
                            border: {display: false}
                        },
                        x: {
                            ticks: {color: '#b0b0b0', font: {size: 10}},
                            grid: {display: false},
                            border: {display: false}
                        }
                    }
                }
            });
        }
        
        async function navScan(name) {
            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            
            const apiMap = {
                'Combined': '/api/combined/scan/run',
                'SEPA': '/api/scan/run',
                'QM': '/api/qm/scan/run',
                'ML': '/api/ml/scan/run'
            };
            const apiUrl = apiMap[name];
            if (!apiUrl) return;
            
            overlay.classList.add('active');
            loadText.textContent = `${name} 掃描中...`;
            
            try {
                const response = await fetch(apiUrl, {method: 'POST'});
                const r = await response.json();
                
                if (!response.ok || !r.job_id) {
                    loadText.textContent = `掃描失敗: ${r.error || r.message || '未知錯誤'}`;
                    setTimeout(() => overlay.classList.remove('active'), 2000);
                    return;
                }
                
                const jobId = r.job_id;
                const statusUrl = apiUrl.replace('/run', `/status/${jobId}`);
                let done = false;
                
                while (!done) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    try {
                        const statusResponse = await fetch(statusUrl);
                        const s = await statusResponse.json();
                        
                        if (s.status === 'completed' || s.stage === 'idle') {
                            done = true;
                            loadText.textContent = `${name} 掃描已完成！`;
                            setTimeout(() => overlay.classList.remove('active'), 1500);
                        } else if (s.status === 'error') {
                            loadText.textContent = `掃描錯誤: ${s.error || 'Unknown'}`;
                            setTimeout(() => overlay.classList.remove('active'), 2000);
                            done = true;
                        } else {
                            const pct = Math.round((s.pct || 0) * 100) / 100;
                            loadText.textContent = `${name} 掃描中... ${pct}%`;
                        }
                    } catch(e) {
                        loadText.textContent = `狀態查詢失敗: ${e.message}`;
                        setTimeout(() => overlay.classList.remove('active'), 2000);
                        done = true;
                    }
                }
            } catch(e) {
                loadText.textContent = `掃描啟動失敗: ${e.message}`;
                setTimeout(() => overlay.classList.remove('active'), 2000);
            }
        }
        
        function showError(msg) {
            document.getElementById('result').style.display = 'block';
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'block';
            errorBox.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
        }
        
        function goBack() {
            window.location.href = '/tg/menu';
        }
        
        // Load analysis on page ready
        document.addEventListener('DOMContentLoaded', loadAnalysis);
    </script>
