<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SEPA StockLab — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --tg-theme-bg-color: #212529;
            --tg-theme-text-color: #f0f0f0;
            --tg-theme-hint-color: #999;
            --tg-theme-link-color: #3fb950;
            --tg-theme-button-color: #3fb950;
            --tg-theme-button-text-color: #fff;
            --tg-theme-secondary-bg-color: #2d333b;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 60px; /* Space for keyboard */
            overflow-x: hidden;
        }
        
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--tg-theme-secondary-bg-color);
            padding: 16px;
            border-bottom: 1px solid #444;
        }
        
        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .ticker-input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        #ticker {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #444;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border-radius: 4px;
            font-size: 16px;
        }
        
        #analyzeBtnSmall {
            padding: 8px 16px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        .result-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--tg-theme-button-color);
        }
        
        .result-card h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            color: var(--tg-theme-text-color);
        }
        
        .result-card p {
            margin: 6px 0;
            font-size: 14px;
            color: var(--tg-theme-text-color);
        }
        
        .result-card .label {
            color: var(--tg-theme-hint-color);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .result-card .value {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-link-color);
        }
        
        .loading {
            text-align: center;
            padding: 32px 16px;
        }
        
        .spinner {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #3f2222;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 4px;
            margin: 12px 0;
            border-left: 4px solid #ff6b6b;
        }
        
        .success {
            background: #223f2d;
            color: #3fb950;
            padding: 12px;
            border-radius: 4px;
            margin: 12px 0;
            border-left: 4px solid #3fb950;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        
        .stat-box {
            background: var(--tg-theme-bg-color);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #444;
        }
        
        .stat-box .label {
            display: block;
            color: var(--tg-theme-hint-color);
            font-size: 11px;
            margin-bottom: 4px;
        }
        
        .stat-box .value {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-link-color);
        }
        
        #strategyTabs {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            overflow-x: auto;
            padding: 0 16px -16px 16px;
            margin-left: -16px;
            margin-right: -16px;
            padding-right: 16px;
        }
        
        .tab-btn {
            padding: 8px 14px;
            background: var(--tg-theme-secondary-bg-color);
            border: 1px solid #444;
            color: var(--tg-theme-text-color);
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }
        
        .reason-list {
            list-style: none;
            padding: 0;
            margin: 8px 0;
        }
        
        .reason-list li {
            padding: 6px 0 6px 20px;
            position: relative;
            font-size: 13px;
            color: var(--tg-theme-text-color);
        }
        
        .reason-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--tg-theme-link-color);
        }
        
        footer {
            background: var(--tg-theme-secondary-bg-color);
            padding: 12px 16px;
            text-align: center;
            border-top: 1px solid #444;
            font-size: 12px;
            color: var(--tg-theme-hint-color);
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>📊 SEPA StockLab</h1>
            <div class="ticker-input-group">
                <input type="text" id="ticker" placeholder="Enter ticker (e.g., NVDA)" 
                       value="{{ ticker }}" autocomplete="off" spellcheck="false">
                <button id="analyzeBtnSmall" onclick="analyzeSmall()">Analyze</button>
            </div>
        </header>
        
        <div class="content" id="content">
            <p style="text-align: center; margin-top: 32px; color: var(--tg-theme-hint-color);">
                🔍 Enter a ticker to analyze
            </p>
        </div>
        
        <footer>
            <div>SEPA StockLab Telegram Mini App</div>
            <div style="margin-top: 4px; font-size: 10px;">Account Size: {{ '{' }}{{ 'account_size' }}{{ '}' }}</div>
        </footer>
    </div>
    
    <script>
        // Initialize Telegram WebApp
        const TelegramApp = window.Telegram.WebApp;
        
        // Setup app
        TelegramApp.ready();
        TelegramApp.expand();
        
        // Store user and token from window context
        const USER = {{ user | tojson }};
        const CHAT_ID = {{ chat_id }};
        let TOKEN = '';
        let CURRENT_STRATEGY = 'QM';
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize token
            initializeToken();
            
            // If ticker was passed in URL, analyze it immediately
            const ticker = document.getElementById('ticker').value;
            if (ticker) {
                analyzeSmall();
            }
        });
        
        function initializeToken() {
            // Try to get token from sessionStorage
            TOKEN = sessionStorage.getItem('tg_token');
            
            if (!TOKEN) {
                // Fetch token from /api/tg/init
                fetch('/api/tg/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({initData: '{{ init_data }}'})
                })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        TOKEN = data.token;
                        sessionStorage.setItem('tg_token', TOKEN);
                        console.log('✓ Token initialized');
                    }
                })
                .catch(e => console.error('Token init error:', e));
            }
        }
        
        function analyzeSmall() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            
            if (!ticker) {
                showError('Please enter a ticker');
                return;
            }
            
            showLoading();
            
            // Set a timeout for the fetch (30 seconds)
            const timeout = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Analysis timeout - taking too long')), 120000)
            );
            
            const fetchPromise = fetch(`/api/tg/analyze/${ticker}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: TOKEN,
                    strategy: CURRENT_STRATEGY
                })
            });
            
            Promise.race([fetchPromise, timeout])
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.result) {
                        displayResult(data.result, CURRENT_STRATEGY);
                        TelegramApp.HapticFeedback.notificationOccurred('success');
                    } else {
                        showError(data.error || 'Analysis failed');
                        TelegramApp.HapticFeedback.notificationOccurred('error');
                    }
                })
                .catch(e => {
                    const errorMsg = e.message || 'Unknown error';
                    showError(`Error: ${errorMsg}`);
                    console.error('Analysis error:', e);
                    TelegramApp.HapticFeedback.notificationOccurred('error');
                });
        }
        
        function displayResult(result, strategy) {
            const content = document.getElementById('content');
            let html = '';
            
            if (strategy === 'SEPA') {
                html = `
                    <div class="result-card">
                        <h3>${result.ticker} — ${result.company || 'N/A'}</h3>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <span class="label">Price</span>
                                <span class="value">$${(result.price || 0).toFixed(2)}</span>
                            </div>
                            <div class="stat-box">
                                <span class="label">RS Rank</span>
                                <span class="value">${(result.rs_rank || 0).toFixed(0)}%</span>
                            </div>
                            <div class="stat-box">
                                <span class="label">SEPA Score</span>
                                <span class="value">${(result.sepa_score || 0).toFixed(1)}/100</span>
                            </div>
                            <div class="stat-box">
                                <span class="label">Recommendation</span>
                                <span class="value">${result.recommendation || '—'}</span>
                            </div>
                        </div>
                        
                        ${result.reasons && result.reasons.length > 0 ? `
                        <div>
                            <strong style="color: var(--tg-theme-hint-color); font-size: 12px;">KEY POINTS</strong>
                            <ul class="reason-list">
                                ${result.reasons.map(r => `<li>${r}</li>`).join('')}
                            </ul>
                        </div>
                        ` : ''}
                        
                        ${result.position ? `
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #444;">
                            <strong style="color: var(--tg-theme-hint-color); font-size: 12px;">TRADE PLAN</strong>
                            <p><strong>Entry:</strong> <span class="value">$${(result.position.entry || 0).toFixed(2)}</span></p>
                            <p><strong>Stop:</strong> <span class="value">$${(result.position.stop || 0).toFixed(2)}</span></p>
                            <p><strong>Target:</strong> <span class="value">$${(result.position.target || 0).toFixed(2)}</span></p>
                            <p><strong>R:R:</strong> <span class="value">${(result.position.rr || 0).toFixed(2)}:1</span></p>
                            <p><strong>Shares:</strong> <span style="color: var(--tg-theme-text-color);">${result.position.shares || '—'}</span></p>
                        </div>
                        ` : ''}
                    </div>
                `;
            } else if (strategy === 'QM') {
                const dims = result.dimensions || {};
                html = `
                    <div class="result-card">
                        <h3>${result.ticker} — Qullamaggie</h3>
                        <p><strong>Star Rating:</strong> <span class="value">${(result.star_rating || 0).toFixed(1)}★</span></p>
                        
                        <strong style="color: var(--tg-theme-hint-color); font-size: 12px;">6 DIMENSIONS</strong>
                        <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-top: 8px;">
                            <div class="stat-box"><span class="label">Momentum</span><span class="value">${(dims.momentum || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">ADR</span><span class="value">${(dims.adr_level || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">Consolidation</span><span class="value">${(dims.consolidation || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">MA</span><span class="value">${(dims.ma_alignment || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">Type</span><span class="value">${(dims.stock_type || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">Timing</span><span class="value">${(dims.market_timing || 0).toFixed(1)}</span></div>
                        </div>
                        
                        ${result.recommendation ? `<p style="margin-top: 12px;"><strong>Action:</strong> ${result.recommendation}</p>` : ''}
                    </div>
                `;
            } else if (strategy === 'ML') {
                const dims = result.dimensions || {};
                html = `
                    <div class="result-card">
                        <h3>${result.ticker} — Martin Luk</h3>
                        <p><strong>Star Rating:</strong> <span class="value">${(result.star_rating || 0).toFixed(1)}★</span></p>
                        
                        <strong style="color: var(--tg-theme-hint-color); font-size: 12px;">7 DIMENSIONS</strong>
                        <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-top: 8px;">
                            <div class="stat-box"><span class="label">EMA</span><span class="value">${(dims.ema_structure || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">Pullback</span><span class="value">${(dims.pullback_quality || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">AVWAP</span><span class="value">${(dims.avwap_confluence || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">Volume</span><span class="value">${(dims.volume_pattern || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">R/R</span><span class="value">${(dims.risk_reward || 0).toFixed(1)}</span></div>
                            <div class="stat-box"><span class="label">RS</span><span class="value">${(dims.relative_strength || 0).toFixed(1)}</span></div>
                        </div>
                        
                        ${result.recommendation ? `<p style="margin-top: 12px;"><strong>Action:</strong> ${result.recommendation}</p>` : ''}
                    </div>
                `;
            }
            
            content.innerHTML = html || '<p>No result</p>';
        }
        
        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading" style="text-align: center; padding: 32px;">
                    <div class="spinner">⏳</div>
                    <p style="margin-top: 12px; color: var(--tg-theme-hint-color);">
                        Analyzing ${document.getElementById('ticker').value.toUpperCase()}...
                    </p>
                    <p style="margin-top: 8px; font-size: 12px; color: var(--tg-theme-hint-color);">
                        This may take 30-60 seconds
                    </p>
                </div>
            `;
        }
        
        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${msg}
                </div>
            `;
        }
        
        // Allow Enter key to analyze
        document.getElementById('ticker').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeSmall();
            }
        });
    </script>
</body>
</html>
