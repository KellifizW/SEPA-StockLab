<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增交易 - StockLab</title>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js" type="module"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255,255,255,0.05);
            --surface-hover: rgba(255,255,255,0.09);
            --border: rgba(255,255,255,0.08);
            --text: #e8eaf6;
            --text-dim: rgba(232,234,246,0.50);
            --accent: #4fc3f7;
            --purple: #7c4dff;
            --green: #69f0ae;
            --gold: #ffd54f;
            --red: #ff5252;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse 70% 40% at 10% 0%, rgba(124,77,255,0.10) 0%, transparent 60%), radial-gradient(ellipse 50% 35% at 90% 100%, rgba(79,195,247,0.07) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 10;
            display: flex; align-items: center; gap: 12px;
            padding: 16px 16px 10px;
            border-bottom: 1px solid var(--border);
        }
        .back-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 16px; cursor: pointer;
            text-decoration: none; flex-shrink: 0;
            transition: background 0.2s;
        }
        .back-btn:active { background: var(--surface-hover); }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

        .content { position: relative; z-index: 5; padding: 12px 12px 90px; }

        .section-label {
            font-size: 10px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 14px 0 7px 2px;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
            margin-bottom: 10px; animation: slide-up 0.35s ease both;
        }
        .card-body { padding: 12px 14px; }

        .search-row { display: flex; gap: 8px; }
        .search-input {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 9px;
            color: var(--text); padding: 10px 12px;
            font-size: 16px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.12); }
        .search-input::placeholder { color: rgba(255,255,255,0.18); font-weight: 400; letter-spacing: 0; }

        .btn-quote {
            background: linear-gradient(135deg, #7c4dff, #4fc3f7);
            border: none; border-radius: 9px; color: #fff;
            padding: 10px 16px; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .btn-quote:active { transform: scale(0.93); }
        .btn-quote:disabled { opacity: 0.5; cursor: default; }

        .lottie-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0; gap: 4px;
        }
        .lottie-container span { font-size: 11px; color: var(--text-dim); }

        .quote-snap {
            background: rgba(255,255,255,0.04); border-radius: 10px;
            border: 1px solid var(--border); padding: 12px; margin-top: 10px;
        }
        .quote-top { display: flex; align-items: baseline; gap: 10px; }
        .quote-ticker { font-size: 18px; font-weight: 800; color: var(--accent); }
        .quote-price { font-size: 24px; font-weight: 700; }
        .quote-chg { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
        .chg-up { color: var(--green); background: rgba(105,240,174,0.12); }
        .chg-down { color: var(--red); background: rgba(255,82,82,0.12); }
        .quote-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px;
        }
        .q-stat { text-align: center; }
        .q-stat-lbl { font-size: 9px; color: var(--text-dim); margin-bottom: 1px; }
        .q-stat-val { font-size: 12px; font-weight: 600; }
        .quote-lock-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-lock {
            flex: 1; background: linear-gradient(135deg, #69f0ae, #00bcd4);
            border: none; border-radius: 9px; color: #0a0e1a;
            padding: 10px; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: transform 0.15s;
        }
        .btn-lock:active { transform: scale(0.95); }
        .btn-requery {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 9px; color: var(--text-dim);
            padding: 10px 14px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-requery:active { transform: scale(0.95); }

        .order-type-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            margin-bottom: 12px;
        }
        .order-btn {
            padding: 8px 4px; text-align: center; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.03);
            color: var(--text-dim); font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.18s;
        }
        .order-btn.active {
            border-color: var(--accent); color: var(--accent);
            background: rgba(79,195,247,0.10);
        }

        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
        .field-grid.full { grid-template-columns: 1fr; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

        .field input, .field select, .field textarea {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            padding: 9px 10px; font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.10);
        }
        .field input::placeholder { color: rgba(255,255,255,0.20); }
        .field select option { background: #0a0e1a; }
        .field textarea { resize: none; }
        .field-hint { font-size: 9px; color: var(--text-dim); margin-top: 1px; }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .sum-item { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10px; border: 1px solid var(--border); }
        .sum-lbl { font-size: 9px; color: var(--text-dim); margin-bottom: 2px; }
        .sum-val { font-size: 14px; font-weight: 700; }

        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            border: none; border-radius: 12px; color: #fff;
            font-size: 15px; font-weight: 800; cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 4px 20px rgba(79,195,247,0.25);
            letter-spacing: 0.5px;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

        .toast {
            position: fixed; bottom: 80px; left: 12px; right: 12px;
            padding: 12px 16px; border-radius: 12px; font-size: 13px;
            font-weight: 600; z-index: 200; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(105,240,174,0.15); border: 1px solid rgba(105,240,174,0.35); color: var(--green); }
        .toast.error { background: rgba(255,82,82,0.15); border: 1px solid rgba(255,82,82,0.35); color: var(--red); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; overflow-x: auto; overflow-y: hidden;
            padding: 6px 4px 14px; z-index: 50; scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s;
            text-decoration: none; color: var(--text-dim);
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0; min-width: 52px;
        }
        .nav-item:active { transform: scale(0.88); }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 18px; line-height: 1; }
        .nav-label { font-size: 9px; font-weight: 600; white-space: nowrap; }
        .nav-item.trade { color: var(--gold); }
        .nav-item.trade:hover, .nav-item.trade:active { color: #ffe082; }

        @keyframes slide-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="header">
        <a class="back-btn" onclick="go('/tg/menu')"></a>
        <div>
            <div class="header-title">新增交易</div>
            <div class="header-subtitle" id="headerLockedTicker">請輸入股票代碼進行快速分析</div>
        </div>
    </div>

    <div class="content">

        <div class="section-label">報價查詢</div>
        <div class="card">
            <div class="card-body">
                <div class="search-row">
                    <input class="search-input" id="tickerInput" placeholder="NVDA" maxlength="6" autocomplete="off" spellcheck="false">
                    <button class="btn-quote" id="btnQuote" onclick="fetchQuote()"> 報價</button>
                </div>

                <div class="lottie-container" id="quoteLoading" style="display:none">
                    <dotlottie-player src="/assets/loading.lottie" autoplay loop style="width:72px;height:72px;"></dotlottie-player>
                    <span>正在獲取報價...</span>
                </div>

                <div class="quote-snap" id="quoteSnap" style="display:none">
                    <div class="quote-top">
                        <span class="quote-ticker" id="snapTicker">-</span>
                        <span class="quote-price" id="snapPrice">-</span>
                        <span class="quote-chg" id="snapChg">-</span>
                    </div>
                    <div class="quote-stats">
                        <div class="q-stat">
                            <div class="q-stat-lbl">高</div>
                            <div class="q-stat-val" id="snapHigh">-</div>
                        </div>
                        <div class="q-stat">
                            <div class="q-stat-lbl">低</div>
                            <div class="q-stat-val" id="snapLow">-</div>
                        </div>
                        <div class="q-stat">
                            <div class="q-stat-lbl">成交</div>
                            <div class="q-stat-val" id="snapVol">-</div>
                        </div>
                    </div>
                    <div class="quote-lock-row">
                        <button class="btn-lock" onclick="lockQuote()"> 確認，填寫訂單</button>
                        <button class="btn-requery" onclick="clearQuote()">重新查詢</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tradeSection" style="display:none">

            <div class="section-label">訂單類型</div>
            <div class="card">
                <div class="card-body">
                    <div class="order-type-row">
                        <div class="order-btn active" onclick="setOrderType('MARKET', this)">
                            <div>MKT</div><div style="font-size:9px;opacity:0.7;margin-top:2px">市價</div>
                        </div>
                        <div class="order-btn" onclick="setOrderType('LIMIT', this)">
                            <div>LMT</div><div style="font-size:9px;opacity:0.7;margin-top:2px">限價</div>
                        </div>
                        <div class="order-btn" onclick="setOrderType('STP_LMT', this)">
                            <div>STP LMT</div><div style="font-size:9px;opacity:0.7;margin-top:2px">停損限</div>
                        </div>
                    </div>

                    <div id="orderMKT">
                        <div class="field">
                            <label>進場價 (市價)</label>
                            <input type="number" id="entryPrice" placeholder="系統將使用報價" step="0.01" oninput="calcSummary()">
                            <div class="field-hint">市價單以最接近的成交價執行</div>
                        </div>
                    </div>
                    <div id="orderLMT" style="display:none">
                        <div class="field">
                            <label>限價 (Limit Price)</label>
                            <input type="number" id="limitPrice" placeholder="指定成交價格" step="0.01" oninput="syncEntry(); calcSummary()">
                            <div class="field-hint">系統將等待至少這個價格的成交</div>
                        </div>
                    </div>
                    <div id="orderSTP_LMT" style="display:none">
                        <div class="field-grid" style="margin-bottom:0">
                            <div class="field">
                                <label>停損點 (Stop)</label>
                                <input type="number" id="stopTrigger" placeholder="觸發價格" step="0.01">
                            </div>
                            <div class="field">
                                <label>限價 (Limit)</label>
                                <input type="number" id="stpLimitPrice" placeholder="限價價格" step="0.01" oninput="syncEntry(); calcSummary()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-label">倉位設定</div>
            <div class="card">
                <div class="card-body">
                    <div class="field-grid" style="margin-bottom:12px">
                        <div class="field">
                            <label>股數 Shares <span style="color:var(--red)">*</span></label>
                            <input type="number" id="sharesInput" placeholder="100" min="1" step="1" oninput="calcSummary()">
                        </div>
                        <div class="field">
                            <label>停損價 Stop Loss <span style="color:var(--red)">*</span></label>
                            <input type="number" id="stopInput" placeholder="停損價格" step="0.01" oninput="calcSummary()">
                        </div>
                        <div class="field">
                            <label>獲利目標 Target</label>
                            <input type="number" id="targetInput" placeholder="獲利價格" step="0.01" oninput="calcSummary()">
                        </div>
                        <div class="field">
                            <label>策略 Strategy</label>
                            <select id="strategySelect">
                                <option value="SEPA">SEPA (Minervini)</option>
                                <option value="QM">QM (Qullamaggie)</option>
                                <option value="ML">ML (Martin Luk)</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="field field-grid full">
                        <label>備註 Note</label>
                        <textarea id="noteInput" placeholder="例如 VCP breakout，長期持倉心得.." rows="2" maxlength="200"></textarea>
                    </div>
                </div>
            </div>

            <div class="section-label">倉位總結</div>
            <div class="card">
                <div class="card-body">
                    <div class="summary-grid">
                        <div class="sum-item">
                            <div class="sum-lbl">倉位大小</div>
                            <div class="sum-val" id="sumSize" style="color:var(--accent)">-</div>
                        </div>
                        <div class="sum-item">
                            <div class="sum-lbl">停損幅度</div>
                            <div class="sum-val" id="sumStopPct" style="color:var(--red)">-</div>
                        </div>
                        <div class="sum-item">
                            <div class="sum-lbl">風險金額</div>
                            <div class="sum-val" id="sumRiskAmt" style="color:var(--gold)">-</div>
                        </div>
                        <div class="sum-item">
                            <div class="sum-lbl">風險比 R:R</div>
                            <div class="sum-val" id="sumRR" style="color:var(--green)">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-submit" id="btnSubmit" onclick="submitTrade()">
                 確認新增交易
            </button>
        </div>

    </div>

    <nav class="bottom-nav">
        <a class="nav-item" onclick="go('/tg/menu')">
            <span class="nav-icon"></span>
            <span class="nav-label">主頁</span>
        </a>
        <a class="nav-item" onclick="navScan('Combined')">
            <span class="nav-icon"></span>
            <span class="nav-label">組合</span>
        </a>
        <a class="nav-item" onclick="navScan('SEPA')">
            <span class="nav-icon">S</span>
            <span class="nav-label">SEPA</span>
        </a>
        <a class="nav-item" onclick="navScan('QM')">
            <span class="nav-icon">Q</span>
            <span class="nav-label">QM</span>
        </a>
        <a class="nav-item" onclick="navScan('ML')">
            <span class="nav-icon">M</span>
            <span class="nav-label">ML</span>
        </a>
        <a class="nav-item" onclick="go('/tg/menu/account')">
            <span class="nav-icon"></span>
            <span class="nav-label">帳戶</span>
        </a>
        <a class="nav-item trade active">
            <span class="nav-icon"></span>
            <span class="nav-label">交易</span>
        </a>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); if (tg.setHeaderColor) tg.setHeaderColor('#0a0e1a'); }

        let _lockedTicker = null;
        let _lockedPrice = null;
        let _orderType = 'MARKET';

        const _urlTicker = '{{ ticker }}';
        if (_urlTicker) document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('tickerInput').value = _urlTicker;
        });

        document.getElementById('tickerInput').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        function go(url) { window.location.href = url; }
        
        async function navScan(name) {
            const apiMap = {
                'Combined': '/api/combined/scan/run',
                'SEPA': '/api/scan/run',
                'QM': '/api/qm/scan/run',
                'ML': '/api/ml/scan/run'
            };
            const apiUrl = apiMap[name];
            if (!apiUrl) return;
            
            showToast(`${name} 掃描啟動中...`, 'success');
            try {
                const r = await fetch(apiUrl, {method: 'POST'}).then(r => r.json());
                if (!r.ok) {
                    showToast(`掃描失敗: ${r.error || '未知錯誤'}`, 'error');
                    return;
                }
                showToast(`${name} 掃描已啟動，背景執行中...`, 'success');
            } catch(e) {
                showToast(`掃描啟動失敗: ${e.message}`, 'error');
            }
        }

        async function fetchQuote() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
            if (!ticker) { showToast('請輸入股票代碼', 'error'); return; }
            document.getElementById('quoteSnap').style.display = 'none';
            document.getElementById('quoteLoading').style.display = 'flex';
            document.getElementById('btnQuote').disabled = true;
            try {
                const d = await fetch(`/api/tg/quote/${ticker}`).then(r => r.json());
                document.getElementById('quoteLoading').style.display = 'none';
                document.getElementById('btnQuote').disabled = false;
                if (!d.ok) { showToast(d.error || '報價查詢失敗', 'error'); return; }
                document.getElementById('snapTicker').textContent = d.ticker;
                document.getElementById('snapPrice').textContent = `$${d.price.toFixed(2)}`;
                const chgEl = document.getElementById('snapChg');
                const up = d.change >= 0;
                chgEl.textContent = `${up?'+':''}${d.change.toFixed(2)} (${up?'+':''}${d.change_pct.toFixed(2)}%)`;
                chgEl.className = `quote-chg ${up ? 'chg-up' : 'chg-down'}`;
                document.getElementById('snapHigh').textContent = `$${d.high.toFixed(2)}`;
                document.getElementById('snapLow').textContent = `$${d.low.toFixed(2)}`;
                document.getElementById('snapVol').textContent = fmtVol(d.volume);
                document.getElementById('quoteSnap').style.display = 'block';
                document.getElementById('quoteSnap').dataset.price = d.price;
                document.getElementById('quoteSnap').dataset.ticker = d.ticker;
            } catch(e) {
                document.getElementById('quoteLoading').style.display = 'none';
                document.getElementById('btnQuote').disabled = false;
                showToast('網路錯誤: ' + e.message, 'error');
            }
        }

        function lockQuote() {
            const ds = document.getElementById('quoteSnap').dataset;
            _lockedTicker = ds.ticker;
            _lockedPrice = parseFloat(ds.price);
            document.getElementById('entryPrice').value = _lockedPrice.toFixed(2);
            document.getElementById('limitPrice').value = _lockedPrice.toFixed(2);
            document.getElementById('stpLimitPrice').value = (_lockedPrice * 1.001).toFixed(2);
            document.getElementById('tradeSection').style.display = 'block';
            document.getElementById('tradeSection').scrollIntoView({behavior:'smooth'});
            document.getElementById('headerLockedTicker').textContent = `${_lockedTicker} @ $${_lockedPrice.toFixed(2)}`;
            calcSummary();
        }

        function clearQuote() {
            document.getElementById('quoteSnap').style.display = 'none';
            document.getElementById('tradeSection').style.display = 'none';
            document.getElementById('tickerInput').focus();
            _lockedTicker = null;
            _lockedPrice = null;
            document.getElementById('headerLockedTicker').textContent = '請輸入股票代碼進行快速分析';
        }

        function setOrderType(type, el) {
            _orderType = type;
            document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('orderMKT').style.display = type === 'MARKET' ? 'block' : 'none';
            document.getElementById('orderLMT').style.display = type === 'LIMIT' ? 'block' : 'none';
            document.getElementById('orderSTP_LMT').style.display = type === 'STP_LMT' ? 'block' : 'none';
            syncEntry();
            calcSummary();
        }

        function syncEntry() {
            let price = null;
            if (_orderType === 'LIMIT') price = parseFloat(document.getElementById('limitPrice').value) || _lockedPrice;
            if (_orderType === 'STP_LMT') price = parseFloat(document.getElementById('stpLimitPrice').value) || _lockedPrice;
            if (_orderType === 'MARKET') price = parseFloat(document.getElementById('entryPrice').value) || _lockedPrice;
            document.getElementById('entryPrice').value = price ? price.toFixed(2) : '';
        }

        function calcSummary() {
            let entry = parseFloat(document.getElementById('entryPrice').value) || 0;
            const shares = parseInt(document.getElementById('sharesInput').value) || 0;
            const stop = parseFloat(document.getElementById('stopInput').value) || 0;
            const target = parseFloat(document.getElementById('targetInput').value) || 0;

            if (_orderType === 'LIMIT') entry = parseFloat(document.getElementById('limitPrice').value) || entry;
            if (_orderType === 'STP_LMT') entry = parseFloat(document.getElementById('stpLimitPrice').value) || entry;

            const posSize = entry * shares;
            document.getElementById('sumSize').textContent = posSize > 0 ? `$${posSize.toFixed(0)}` : '-';

            if (entry > 0 && stop > 0) {
                const stopPct = (entry - stop) / entry * 100;
                const riskAmt = (entry - stop) * shares;
                document.getElementById('sumStopPct').textContent = `-${stopPct.toFixed(1)}%`;
                document.getElementById('sumRiskAmt').textContent = `$${riskAmt.toFixed(0)}`;
                if (target > entry) {
                    const rr = (target - entry) / (entry - stop);
                    const rrEl = document.getElementById('sumRR');
                    rrEl.textContent = `${rr.toFixed(1)}:1`;
                    rrEl.style.color = rr >= 2 ? 'var(--green)' : rr >= 1.5 ? 'var(--gold)' : 'var(--red)';
                } else {
                    document.getElementById('sumRR').textContent = '-';
                }
            } else {
                document.getElementById('sumStopPct').textContent = '-';
                document.getElementById('sumRiskAmt').textContent = '-';
                document.getElementById('sumRR').textContent = '-';
            }
        }

        async function submitTrade() {
            const ticker = _lockedTicker;
            let entry = parseFloat(document.getElementById('entryPrice').value) || 0;
            const shares = parseInt(document.getElementById('sharesInput').value) || 0;
            const stop = parseFloat(document.getElementById('stopInput').value) || 0;
            const target = parseFloat(document.getElementById('targetInput').value) || null;
            const strategy = document.getElementById('strategySelect').value;
            const note = document.getElementById('noteInput').value.trim();

            if (_orderType === 'LIMIT') entry = parseFloat(document.getElementById('limitPrice').value) || entry;
            if (_orderType === 'STP_LMT') entry = parseFloat(document.getElementById('stpLimitPrice').value) || entry;

            if (!ticker) { showToast('請先鎖定股票報價', 'error'); return; }
            if (!entry) { showToast('請輸入進場價', 'error'); return; }
            if (!shares) { showToast('請輸入股數', 'error'); return; }
            if (!stop) { showToast('停損價必填', 'error'); return; }
            if (stop >= entry) { showToast('停損價應低於進場價', 'error'); return; }
            if (target && target <= entry) { showToast('獲利目標應高於進場價', 'error'); return; }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = '傳送中..';
            try {
                const r = await fetch('/api/quick-add-position', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ticker, buy_price: entry, shares, stop_loss: stop,
                        target: target || null, strategy, note,
                        order_type: _orderType
                    })
                }).then(x => x.json());

                if (r.ok) {
                    showToast(`新增 ${ticker} 交易成功`, 'success');
                    if (tg?.showPopup) {
                        tg.showPopup({
                            title: '交易已新增',
                            message: `${ticker} @ $${entry.toFixed(2)}  ${shares} 股\n停損 $${stop.toFixed(2)}`,
                            buttons: [{type: 'ok'}]
                        });
                    }
                    setTimeout(() => go('/tg/menu'), 2000);
                } else {
                    showToast(r.error || '交易新增失敗', 'error');
                    btn.disabled = false;
                    btn.textContent = ' 確認新增交易';
                }
            } catch(e) {
                showToast('網路錯誤: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = ' 確認新增交易';
            }
        }

        function fmtVol(v) {
            if (!v) return '-';
            if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
            if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
            return v.toString();
        }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast ${type} show`;
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
