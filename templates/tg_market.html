<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場環境 - SEPA StockLab</title>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js" type="module"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #e8eaf6;
            --accent: #58a6ff;
        }
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0;
            margin: 0;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.5rem;
        }
        .header h1 {
            font-size: 1.3rem;
            margin: 0;
            flex: 1;
        }
        .container {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            font-weight: 600;
            color: var(--accent);
        }
        .card-body {
            padding: 1rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .stat-label {
            font-weight: 500;
        }
        .stat-value {
            color: var(--accent);
            font-weight: 600;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; overflow-x: auto; overflow-y: hidden;
            padding: 6px 4px 14px; z-index: 50;
            scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s;
            text-decoration: none; color: #8b949e;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0; min-width: 52px;
        }
        .nav-item:active { transform: scale(0.88); }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-icon  { font-size: 18px; line-height: 1; }
        .nav-label { font-size: 9px; font-weight: 600; white-space: nowrap; }
        .nav-item.trade { color: #ffd54f; }
        .nav-item.trade:hover, .nav-item.trade:active { color: #ffe082; }

        .container {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/tg/menu" title="返回菜單">&larr;</a>
        <h1>🌍 市場環境</h1>
    </div>
    
    <div class="container">
        <div id="content" class="loading">
            <div class="spinner"></div>
            <p>加載中...</p>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function loadMarket() {
            try {
                const response = await fetch('/api/market-env');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (!data.ok) {
                    document.getElementById('content').innerHTML = `<p>❌ ${data.error}</p>`;
                    return;
                }
                
                const env = data.env || {};
                const html = `
                    <div class="card">
                        <div class="card-header">📊 大盤指數</div>
                        <div class="card-body">
                            <div class="stat-row">
                                <span class="stat-label">SPY</span>
                                <span class="stat-value">${env.spy_close || 'N/A'}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">QQQ</span>
                                <span class="stat-value">${env.qqq_close || 'N/A'}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">IWM</span>
                                <span class="stat-value">${env.iwm_close || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">📈 市場狀態</div>
                        <div class="card-body">
                            <div class="stat-row">
                                <span class="stat-label">當前表現</span>
                                <span class="stat-value">${env.regime || 'N/A'}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">分佈日</span>
                                <span class="stat-value">${env.dist_days || 0}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">新高/新低</span>
                                <span class="stat-value">${env.nh_nl || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('content').innerHTML = html;
            } catch (e) {
                document.getElementById('content').innerHTML = `<p>❌ 錯誤：${e.message}</p>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadMarket);

    </script>

    {% set tg_active_page = '' %}
    {% include "_tg_bottom_nav.html" %}
</body>
</html>
