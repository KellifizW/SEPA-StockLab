<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SEPA StockLab — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #212529;
            --tg-theme-text-color: #f0f0f0;
            --tg-theme-hint-color: #999;
            --tg-theme-link-color: #3fb950;
            --tg-theme-button-color: #3fb950;
            --tg-theme-button-text-color: #fff;
            --tg-theme-secondary-bg-color: #2d333b;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--tg-theme-secondary-bg-color);
            padding: 12px 16px;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }
        
        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }
        
        .search-bar {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #444;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border-radius: 4px;
            font-size: 14px;
        }
        
        .search-bar button {
            padding: 6px 12px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 60px;
        }
        
        .content-wrapper {
            padding: 0;
        }
        
        /* Strategy Tabs */
        .strategy-tabs {
            display: flex;
            gap: 0;
            background: var(--tg-theme-secondary-bg-color);
            border-bottom: 2px solid #444;
            overflow-x: auto;
            padding: 0;
            margin: 0;
        }
        
        .strategy-tab {
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--tg-theme-hint-color);
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .strategy-tab:hover {
            color: var(--tg-theme-text-color);
        }
        
        .strategy-tab.active {
            color: var(--tg-theme-button-color);
            border-bottom-color: var(--tg-theme-button-color);
            background: rgba(63, 185, 80, 0.05);
        }
        
        .result-sheet {
            display: none;
        }
        
        .result-sheet.active {
            display: block;
        }
        
        .card-body {
            padding: 16px;
        }
        
        .price-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color);
            border-bottom: 1px solid #444;
        }
        
        .price-header h2 {
            margin: 0;
            font-size: 24px;
        }
        
        .price-change {
            text-align: right;
        }
        
        .chart-container {
            position: relative;
            height: 250px;
            margin: 16px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 6px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
        }
        
        .metric {
            background: var(--tg-theme-secondary-bg-color);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        
        .metric-label {
            color: var(--tg-theme-hint-color);
            font-size: 11px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-link-color);
        }
        
        .section {
            padding: 16px;
            border-top: 1px solid #444;
        }
        
        .section-title {
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .rec-box {
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 14px;
            font-weight: 500;
        }
        
        .rec-buy {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
            border-left: 4px solid #3fb950;
        }
        
        .rec-watch {
            background: rgba(255, 198, 41, 0.15);
            color: #ffc629;
            border-left: 4px solid #ffc629;
        }
        
        .rec-avoid {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
        }
        
        .dimensions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        
        .dimension {
            background: var(--tg-theme-bg-color);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #444;
        }
        
        .dimension-name {
            font-size: 11px;
            color: var(--tg-theme-hint-color);
        }
        
        .dimension-score {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-link-color);
            margin-top: 4px;
        }
        
        .loading {
            text-align: center;
            padding: 40px 16px;
        }
        
        .spinner {
            font-size: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error-box {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            padding: 16px;
            border-radius: 6px;
            margin: 16px;
            border-left: 4px solid #ff6b6b;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color);
        }
        
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color);
            padding: 8px 16px;
            text-align: center;
            border-top: 1px solid #444;
            font-size: 11px;
            color: var(--tg-theme-hint-color);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>📊 SEPA StockLab — QM Mode</h1>
            <div class="search-bar">
                <input type="text" id="ticker" placeholder="Enter ticker..." 
                       value="{{ ticker }}" autocomplete="off" spellcheck="false">
                <button onclick="handleAnalyze()">Analyze</button>
            </div>
        </header>
        
        <div class="content" id="content">
            <div class="empty-state">
                <p>🔍 Enter a ticker to get started</p>
            </div>
        </div>
        
        <footer>
            <div>SEPA StockLab — Qullamaggie Analysis</div>
        </footer>
    </div>
    
    <script>
        const TelegramApp = window.Telegram.WebApp;
        TelegramApp.ready();
        TelegramApp.expand();
        
        const USER = {{ user | tojson }};
        const CHAT_ID = {{ chat_id }};
        let TOKEN = '';
        let CURRENT_TICKER = '';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeToken();
            const ticker = document.getElementById('ticker').value;
            if (ticker) {
                handleAnalyze();
            }
        });
        
        document.getElementById('ticker').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleAnalyze();
            }
        });
        
        function initializeToken() {
            TOKEN = sessionStorage.getItem('tg_token');
            if (!TOKEN) {
                fetch('/api/tg/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({initData: '{{ init_data }}'})
                })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        TOKEN = data.token;
                        sessionStorage.setItem('tg_token', TOKEN);
                    }
                })
                .catch(e => console.error('Token init error:', e));
            }
        }
        
        function handleAnalyze() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            if (!ticker) {
                showError('Please enter a ticker');
                return;
            }
            
            CURRENT_TICKER = ticker;
            showLoading(`Analyzing ${ticker} with Qullamaggie...`);
            
            // Fetch QM analysis only
            fetchAnalysis(ticker, 'QM')
                .then(response => {
                    if (response.ok && response.result) {
                        displayResult(response.result);
                        TelegramApp.HapticFeedback.notificationOccurred('success');
                    } else {
                        showError(response.error || 'Analysis failed');
                        TelegramApp.HapticFeedback.notificationOccurred('error');
                    }
                })
                .catch(e => {
                    showError(`Error: ${e.message}`);
                    console.error('Analysis error:', e);
                    TelegramApp.HapticFeedback.notificationOccurred('error');
                });
        }
        
        function fetchAnalysis(ticker, strategy) {
            const timeout = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Analysis timeout')), 120000)
            );
            
            const fetchPromise = fetch(`/api/tg/analyze/${ticker}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: TOKEN, strategy: strategy})
            }).then(r => r.json());
            
            return Promise.race([fetchPromise, timeout]);
        }
        
        function displayResult(result) {
            const content = document.getElementById('content');
            const dims = result.dimensions || {};
            
            let html = `
                <div class="price-header">
                    <div>
                        <h2>${result.ticker}</h2>
                        <small style="color: var(--tg-theme-hint-color);">Qullamaggie</small>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 20px;">$${(result.close || 0).toFixed(2)}</div>
                        <small style="color: var(--tg-theme-hint-color);">ADR: ${(result.adr || 0).toFixed(1)}%</small>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric">
                        <div class="metric-label">Star Rating</div>
                        <div class="metric-value">${(result.star_rating || 0).toFixed(1)}⭐</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Dollar Volume</div>
                        <div class="metric-value">$${(result.dollar_volume_m || 0).toFixed(1)}M</div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">Recommendation</div>
                    <div class="rec-box ${getRecClass(result.recommendation)}">${result.recommendation || 'NEUTRAL'}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">6 Dimensions</div>
                    <div class="dimensions-grid">
                        <div class="dimension">
                            <div class="dimension-name">Momentum</div>
                            <div class="dimension-score">${(dims.momentum || 0).toFixed(1)}</div>
                        </div>
                        <div class="dimension">
                            <div class="dimension-name">ADR</div>
                            <div class="dimension-score">${(dims.adr_level || 0).toFixed(1)}</div>
                        </div>
                        <div class="dimension">
                            <div class="dimension-name">Consolidation</div>
                            <div class="dimension-score">${(dims.consolidation || 0).toFixed(1)}</div>
                        </div>
                        <div class="dimension">
                            <div class="dimension-name">MA</div>
                            <div class="dimension-score">${(dims.ma_alignment || 0).toFixed(1)}</div>
                        </div>
                        <div class="dimension">
                            <div class="dimension-name">Type</div>
                            <div class="dimension-score">${(dims.stock_type || 0).toFixed(1)}</div>
                        </div>
                        <div class="dimension">
                            <div class="dimension-name">Timing</div>
                            <div class="dimension-score">${(dims.market_timing || 0).toFixed(1)}</div>
                        </div>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
            
            // Load chart after rendering
            setTimeout(() => loadChart(CURRENT_TICKER), 100);
        }
        
        function getRecClass(rec) {
            if (!rec) return 'rec-avoid';
            rec = rec.toUpperCase();
            if (rec.includes('BUY') || rec.includes('STRONG')) return 'rec-buy';
            if (rec.includes('WATCH')) return 'rec-watch';
            return 'rec-avoid';
        }
        
        function loadChart(ticker) {
            fetch(`/api/chart/enriched/${ticker}`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.candles && data.candles.length > 0) {
                        drawChart(data.candles);
                    }
                })
                .catch(e => console.log('Chart load skipped:', e.message));
        }
        
        function drawChart(candles) {
            const canvas = document.getElementById('priceChart');
            if (!canvas) return;
            
            // Take last 30 candles
            const chartData = candles.slice(-30);
            const ctx = canvas.getContext('2d');
            
            // Destroy old chart if exists
            if (canvas.chart) {
                canvas.chart.destroy();
            }
            
            canvas.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(c => {
                        const d = new Date(c.time * 1000);
                        return (d.getMonth() + 1) + '/' + d.getDate();
                    }),
                    datasets: [{
                        label: 'Close',
                        data: chartData.map(c => c.close),
                        borderColor: '#3fb950',
                        backgroundColor: 'rgba(63, 185, 80, 0.05)',
                        tension: 0.3,
                        fill: true,
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {display: false}},
                    scales: {
                        y: {
                            ticks: {color: '#999', font: {size: 10}},
                            grid: {color: '#444', drawBorder: false},
                            border: {display: false}
                        },
                        x: {
                            ticks: {color: '#999', font: {size: 10}},
                            grid: {display: false},
                            border: {display: false}
                        }
                    }
                }
            });
        }
        
        function showLoading(message) {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner">⏳</div>
                    <p style="margin-top: 16px; color: var(--tg-theme-hint-color);">
                        ${message}
                    </p>
                    <p style="font-size: 12px; color: var(--tg-theme-hint-color);">
                        This may take 30-60 seconds
                    </p>
                </div>
            `;
        }
        
        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="error-box" style="margin: 16px;">
                    <strong>Error:</strong> ${msg}
                </div>
            `;
        }
    </script>
</body>
</html>
