<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockLab Dashboard</title>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js" type="module"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255,255,255,0.05);
            --surface-hover: rgba(255,255,255,0.09);
            --border: rgba(255,255,255,0.08);
            --text: #e8eaf6;
            --text-dim: rgba(232,234,246,0.50);
            --accent: #4fc3f7;
            --purple: #7c4dff;
            --green: #69f0ae;
            --gold: #ffd54f;
            --red: #ff5252;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 40% at 10% 0%, rgba(79,195,247,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 90% 100%, rgba(124,77,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        .header {
            position: relative; z-index: 10;
            padding: 18px 16px 12px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .logo {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(79,195,247,0.3);
        }

        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
        .header-date  { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

        .regime-badge {
            font-size: 10px; font-weight: 600;
            padding: 4px 10px; border-radius: 20px; border: 1px solid;
            letter-spacing: 0.3px; white-space: nowrap;
        }
        .regime-up     { color: var(--green); border-color: rgba(105,240,174,0.4); background: rgba(105,240,174,0.08); }
        .regime-warn   { color: var(--gold);  border-color: rgba(255,213,79,0.4);  background: rgba(255,213,79,0.08); }
        .regime-danger { color: var(--red);   border-color: rgba(255,82,82,0.4);   background: rgba(255,82,82,0.08); }

        /* ── Layout ── */
        .content { position: relative; z-index: 5; padding: 0 12px 80px; }

        .section-label {
            font-size: 10px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 16px 0 8px 2px;
        }

        /* ── Search card ── */
        .search-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px;
            backdrop-filter: blur(10px);
            animation: slide-up 0.4s ease both;
        }

        .search-row { display: flex; gap: 8px; margin-bottom: 7px; }

        .search-input {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 9px;
            color: var(--text); padding: 9px 12px;
            font-size: 15px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.12); }
        .search-input::placeholder { color: rgba(255,255,255,0.18); font-weight: 400; letter-spacing: 0; }

        .btn-sepa {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            border: none; border-radius: 9px; color: #fff;
            padding: 9px 14px; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;
        }
        .btn-sepa:active { transform: scale(0.94); }
        .btn-sepa:hover  { box-shadow: 0 4px 16px rgba(79,195,247,0.35); }

        .strat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

        .btn-strat {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-dim);
            padding: 7px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-strat:hover  { background: rgba(255,255,255,0.09); color: var(--text); border-color: rgba(255,255,255,0.18); }
        .btn-strat:active { transform: scale(0.95); }

        /* ── Metric cards ── */
        .metrics-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            animation: slide-up 0.4s ease 0.08s both;
        }

        .metric-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 8px; text-align: center;
            cursor: pointer; text-decoration: none; color: inherit;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .metric-card:active { transform: scale(0.93); }
        .metric-card:hover  { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); }

        .metric-val { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .metric-lbl { font-size: 10px; color: var(--text-dim); line-height: 1.3; }

        /* ── Data cards ── */
        .data-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
            animation: slide-up 0.4s ease both; margin-bottom: 10px;
        }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-bottom: 1px solid var(--border);
        }
        .card-header-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
        .card-header-link  { font-size: 11px; color: var(--accent); text-decoration: none; cursor: pointer; }
        .card-header-link:hover { color: #79c0ff; }

        /* ── Rows ── */
        .data-row {
            display: flex; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            cursor: pointer; text-decoration: none; color: inherit;
            transition: background 0.15s; -webkit-tap-highlight-color: transparent;
        }
        .data-row:last-child { border-bottom: none; }
        .data-row:active { background: rgba(255,255,255,0.05); }

        .row-rank   { width: 18px; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
        .row-ticker { font-size: 14px; font-weight: 700; color: var(--accent); }
        .row-ticker.qm-color { color: var(--gold); }
        .row-sub    { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
        .row-right  { margin-left: auto; text-align: right; }
        .row-score  { font-size: 13px; font-weight: 700; }

        .score-high { color: var(--green); }
        .score-mid  { color: var(--gold); }
        .score-low  { color: var(--text-dim); }

        /* Watchlist */
        .wl-row {
            display: flex; align-items: center;
            padding: 9px 14px; border-bottom: 1px solid var(--border);
            cursor: pointer; text-decoration: none; color: inherit;
            transition: background 0.15s; -webkit-tap-highlight-color: transparent;
        }
        .wl-row:last-child { border-bottom: none; }
        .wl-row:active { background: rgba(255,255,255,0.05); }

        .wl-grade {
            width: 22px; height: 22px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; margin-right: 10px; flex-shrink: 0;
        }
        .grade-A { background: rgba(105,240,174,0.15); color: var(--green); }
        .grade-B { background: rgba(255,213,79,0.13);  color: var(--gold); }
        .grade-C { background: rgba(255,255,255,0.07); color: var(--text-dim); }

        /* Empty / skeleton */
        .empty-state { padding: 20px 14px; text-align: center; color: var(--text-dim); font-size: 12px; }
        .empty-icon  { font-size: 28px; margin-bottom: 6px; }
        .skeleton    { background: rgba(255,255,255,0.06); border-radius: 6px; animation: shimmer 1.4s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* ── Market strip ── */
        .market-strip {
            display: flex; align-items: center; justify-content: space-around;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 10px 4px;
            margin-bottom: 12px; animation: slide-up 0.4s ease 0.05s both;
        }
        .mkt-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .mkt-sym   { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; }
        .mkt-price { font-size: 13px; font-weight: 700; color: var(--text); }
        .mkt-chg   { font-size: 9px; font-weight: 600; }
        .mkt-sep   { width: 1px; height: 28px; background: var(--border); }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(10,14,26,0.88);
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .loading-text { font-size: 13px; color: var(--text-dim); margin-top: 8px; text-align: center; white-space: pre-wrap; }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; overflow-x: auto; overflow-y: hidden;
            padding: 6px 4px 14px; z-index: 50;
            scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s;
            text-decoration: none; color: var(--text-dim);
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0; min-width: 52px;
        }
        .nav-item:active { transform: scale(0.88); }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-icon  { font-size: 18px; line-height: 1; }
        .nav-label { font-size: 9px; font-weight: 600; white-space: nowrap; }
        /* trade button accent */
        .nav-item.trade { color: var(--gold); }
        .nav-item.trade:hover, .nav-item.trade:active { color: #ffe082; }

        /* ── Animations ── */
        @keyframes slide-up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <dotlottie-player src="/assets/loading.lottie" autoplay loop style="width:110px;height:110px;"></dotlottie-player>
        <div class="loading-text" id="loadingText">掃描啟動中...</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">📊</div>
            <div>
                <div class="header-title">StockLab</div>
                <div class="header-date" id="headerDate"></div>
            </div>
        </div>
        <div class="regime-badge regime-warn" id="regimeBadge">載入中...</div>
    </div>

    <div class="content">

        <!-- Market strip -->
        <div class="market-strip" id="marketStrip">
            <div class="mkt-item">
                <span class="mkt-sym" style="color:var(--accent)">SPY</span>
                <span class="mkt-price" id="mktSPY">—</span>
                <span class="mkt-chg" id="mktSPYchg" style="color:var(--text-dim)"></span>
            </div>
            <div class="mkt-sep"></div>
            <div class="mkt-item">
                <span class="mkt-sym" style="color:var(--purple)">QQQ</span>
                <span class="mkt-price" id="mktQQQ">—</span>
                <span class="mkt-chg" id="mktQQQchg" style="color:var(--text-dim)"></span>
            </div>
            <div class="mkt-sep"></div>
            <div class="mkt-item">
                <span class="mkt-sym" style="color:var(--green)">IWM</span>
                <span class="mkt-price" id="mktIWM">—</span>
                <span class="mkt-chg" id="mktIWMchg" style="color:var(--text-dim)"></span>
            </div>
            <div class="mkt-sep"></div>
            <div class="mkt-item">
                <span class="mkt-sym" style="color:var(--text-dim)">派發日</span>
                <span class="mkt-price" id="mktDistDays" style="font-size:14px">—</span>
            </div>
        </div>

        <!-- Quick Search -->
        <div class="search-card">
            <div class="search-row">
                <input class="search-input" id="tickerInput" placeholder="NVDA" maxlength="6" autocomplete="off" spellcheck="false">
            </div>
            <div class="strat-row">
                <button class="btn-strat" onclick="quickAnalyze('sepa')">SEPA</button>
                <button class="btn-strat" onclick="quickAnalyze('qm')">⚡ QM</button>
                <button class="btn-strat" onclick="quickAnalyze('ml')">🔬 ML</button>
            </div>
        </div>

        <!-- Metrics -->
        <div class="section-label">📋 概覽</div>
        <div class="metrics-grid">
            <a class="metric-card" onclick="go('/tg/menu/positions')">
                <div class="metric-val" id="metricPositions" style="color:var(--accent)">—</div>
                <div class="metric-lbl">持倉數量</div>
            </a>
            <a class="metric-card" onclick="go('/tg/menu/watchlist')">
                <div class="metric-val" id="metricWlA" style="color:var(--green)">—</div>
                <div class="metric-lbl">A 級觀察</div>
            </a>
            <a class="metric-card" onclick="go('/tg/menu/watchlist')">
                <div class="metric-val" id="metricWlB" style="color:var(--gold)">—</div>
                <div class="metric-lbl">B 級觀察</div>
            </a>
        </div>

        <!-- Positions preview -->
        <div class="section-label">💼 持倉</div>
        <div class="data-card">
            <div class="card-header">
                <span class="card-header-title">開放持倉</span>
                <span class="card-header-link" onclick="go('/tg/menu/positions')">查看全部 →</span>
            </div>
            <div id="positionsBody">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:60%;margin:8px auto 6px;"></div>
                    <div class="skeleton" style="height:12px;width:45%;margin:0 auto 8px;"></div>
                </div>
            </div>
        </div>

        <!-- Watchlist preview -->
        <div class="section-label">⭐ 觀察清單</div>
        <div class="data-card">
            <div class="card-header">
                <span class="card-header-title">⭐ A / B 級</span>
                <span class="card-header-link" onclick="go('/tg/menu/watchlist')">查看全部 →</span>
            </div>
            <div id="watchlistBody">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:55%;margin:8px auto 6px;"></div>
                    <div class="skeleton" style="height:12px;width:40%;margin:0 auto 8px;"></div>
                </div>
            </div>
        </div>

        <!-- Combined scan highlights -->
        <div class="section-label">🚀 上次 Combined 掃描摘要</div>
        <div class="data-card">
            <div class="card-header">
                <span class="card-header-title">📡 SEPA Top 5</span>
                <span class="card-header-link" onclick="navScan('SEPA')">搜尋分析 →</span>
            </div>
            <div id="sepaBody">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:60%;margin:8px auto 6px;"></div>
                    <div class="skeleton" style="height:12px;width:40%;margin:0 auto 8px;"></div>
                </div>
            </div>
        </div>

        <!-- QM scan highlights -->
        <div class="data-card">
            <div class="card-header">
                <span class="card-header-title">⚡ QM Top 5</span>
                <span class="card-header-link" onclick="navScan('QM')">搜尋分析 →</span>
            </div>
            <div id="qmBody">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:60%;margin:8px auto 6px;"></div>
                    <div class="skeleton" style="height:12px;width:40%;margin:0 auto 8px;"></div>
                </div>
            </div>
        </div>

        <!-- ML scan highlights -->
        <div class="data-card">
            <div class="card-header">
                <span class="card-header-title">🟢 ML Top 5</span>
                <span class="card-header-link" onclick="navScan('ML')">搜尋分析 →</span>
            </div>
            <div id="mlBody">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:60%;margin:8px auto 6px;"></div>
                    <div class="skeleton" style="height:12px;width:40%;margin:0 auto 8px;"></div>
                </div>
            </div>
        </div>

    </div>

    {% set tg_active_page = 'home' %}
    {% include "_tg_bottom_nav.html" %}

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.setHeaderColor) tg.setHeaderColor('#0a0e1a');

        const now = new Date();
        document.getElementById('headerDate').textContent =
            now.toLocaleDateString('zh-Hant', {month:'short', day:'numeric', weekday:'short'});

        document.getElementById('tickerInput').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        function go(url) { window.location.href = url; }

        function quickAnalyze(strategy) {
            const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
            if (!ticker) {
                tg.showAlert ? tg.showAlert('請輸入股票代碼') : alert('請輸入股票代碼');
                document.getElementById('tickerInput').focus();
                return;
            }
            
            // Show loading overlay with lottie animation
            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            overlay.classList.add('active');
            loadText.textContent = `${strategy.toUpperCase()} 分析中...\n需要 30-60 秒`;
            
            // Navigate after a brief delay to ensure animation starts
            setTimeout(() => {
                window.location.href = `/tg/analyze/${ticker}?strategy=${strategy.toUpperCase()}`;
            }, 300);
        }

        // Helper: trigger scan (shows loading, polls status, notifies on complete)
        async function navScan(name) {
            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            
            const apiMap = {
                'Combined': '/api/combined/scan/run',
                'SEPA': '/api/scan/run',
                'QM': '/api/qm/scan/run',
                'ML': '/api/ml/scan/run'
            };
            const apiUrl = apiMap[name];
            if (!apiUrl) return;
            
            overlay.classList.add('active');
            loadText.textContent = `${name} 掃描中...`;
            
            try {
                const r = await fetch(apiUrl, {method: 'POST'}).then(r => r.json());
                if (!r.ok) {
                    loadText.textContent = `掃描失敗: ${r.error || '未知錯誤'}`;
                    setTimeout(() => overlay.classList.remove('active'), 2000);
                    return;
                }
                
                const jobId = r.job_id || r.jid;
                if (!jobId) {
                    loadText.textContent = '掃描已完成！';
                    setTimeout(() => overlay.classList.remove('active'), 1500);
                    return;
                }
                
                // Poll status
                const statusUrl = apiUrl.replace('/run', `/status/${jobId}`);
                let done = false;
                while (!done) {
                    await new Promise(r => setTimeout(r, 1000));
                    try {
                        const s = await fetch(statusUrl).then(r => r.json());
                        if (s.status === 'completed' || s.stage === 'idle') {
                            done = true;
                            loadText.textContent = `${name} 掃描已完成！`;
                            setTimeout(() => overlay.classList.remove('active'), 1500);
                            if (tg.showPopup) tg.showPopup({title: 'scan', message: `${name} scan complete`, buttons: [{type: 'ok'}]});
                        } else if (s.status === 'error') {
                            loadText.textContent = `掃描錯誤: ${s.error || 'Unknown'}`;
                            setTimeout(() => overlay.classList.remove('active'), 2000);
                            done = true;
                        } else {
                            loadText.textContent = `${name} 掃描中... ${s.pct || 0}%`;
                        }
                    } catch(e) {
                        loadText.textContent = `狀態查詢失敗`;
                        setTimeout(() => overlay.classList.remove('active'), 2000);
                        done = true;
                    }
                }
            } catch(e) {
                loadText.textContent = `掃描啟動失敗`;
                setTimeout(() => overlay.classList.remove('active'), 2000);
            }
        }

        // Market regime + strip
        async function loadMarket() {
            try {
                const d = await fetch('/api/market-env').then(r => r.json());
                const env = d.env || d;
                const regime = env.regime || '';
                const badge  = document.getElementById('regimeBadge');
                const map = {
                    'CONFIRMED_UPTREND':      ['regime-up',     '✅ 上升趨勢'],
                    'UPTREND_UNDER_PRESSURE': ['regime-warn',   '⚠️ 趨勢受壓'],
                    'MARKET_IN_CORRECTION':   ['regime-danger', '🔴 市場調整'],
                    'DOWNTREND':              ['regime-danger', '🔴 下降趨勢'],
                };
                const [cls, label] = map[regime] || ['regime-warn', regime || '未知'];
                badge.className = `regime-badge ${cls}`;
                badge.textContent = label;
                // Populate market strip
                const fmt = v => v ? `$${parseFloat(v).toFixed(0)}` : '—';
                document.getElementById('mktSPY').textContent = fmt(env.spy_close);
                document.getElementById('mktQQQ').textContent = fmt(env.qqq_close);
                document.getElementById('mktIWM').textContent = fmt(env.iwm_close);
                const dd = env.dist_days ?? env.distribution_days;
                document.getElementById('mktDistDays').textContent = dd != null ? dd : '—';
            } catch(e) {
                document.getElementById('regimeBadge').textContent = '市場';
            }
        }

        // Positions
        async function loadPositions() {
            try {
                const d = await fetch('/api/positions-data').then(r => r.json());
                const positions = d.positions || d || {};
                const entries   = Object.entries(positions);
                document.getElementById('metricPositions').textContent = entries.length;
                const body = document.getElementById('positionsBody');
                if (!entries.length) {
                    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>暫無持倉<br><small style="margin-top:4px;display:block"><a onclick="go('/tg/trade')" style="color:var(--accent);cursor:pointer">新增交易 →</a></small></div>`;
                    return;
                }
                body.innerHTML = entries.slice(0, 4).map(([ticker, p]) => {
                    const rr    = p.rr ? `R:R ${parseFloat(p.rr).toFixed(1)}:1` : '';
                    const entry = p.buy_price ? `$${parseFloat(p.buy_price).toFixed(2)}` : '';
                    const stop  = p.stop_loss  ? `止損 $${parseFloat(p.stop_loss).toFixed(2)}` : '';
                    return `<a class="data-row" onclick="go('/tg/analyze/${ticker}?strategy=${p.strategy||'SEPA'}')">
                        <div>
                            <div style="font-size:14px;font-weight:700;color:var(--accent)">${ticker}</div>
                            <div style="font-size:10px;color:var(--text-dim)">${[entry,stop].filter(Boolean).join(' · ')}</div>
                        </div>
                        <div class="row-right">
                            <div style="font-size:12px;font-weight:600;color:var(--text-dim)">${rr}</div>
                            <div style="font-size:10px;color:var(--text-dim)">${p.strategy||''}</div>
                        </div>
                    </a>`;
                }).join('');
            } catch(e) {
                document.getElementById('positionsBody').innerHTML = `<div class="empty-state">無法載入持倉</div>`;
            }
        }

        // Watchlist — handles both array [{ticker,grade,...}] and object {A:{},B:{}} formats
        async function loadWatchlist() {
            try {
                const d = await fetch('/api/watchlist-data').then(r => r.json());
                const raw = d.watchlist || d || {};
                let gradeA, gradeB;
                if (Array.isArray(raw)) {
                    gradeA = raw.filter(i => i.grade === 'A').map(i => [i.ticker, i]);
                    gradeB = raw.filter(i => i.grade === 'B').map(i => [i.ticker, i]);
                } else {
                    gradeA = Object.entries(raw.A || {});
                    gradeB = Object.entries(raw.B || {});
                }
                document.getElementById('metricWlA').textContent = gradeA.length;
                document.getElementById('metricWlB').textContent = gradeB.length;
                const body = document.getElementById('watchlistBody');
                const all  = [
                    ...gradeA.map(([t,item]) => ({ticker:t, data:item, grade:'A'})),
                    ...gradeB.slice(0, 2).map(([t,item]) => ({ticker:t, data:item, grade:'B'})),
                ].slice(0, 5);
                if (!all.length) {
                    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div>觀察清單為空</div>`;
                    return;
                }
                body.innerHTML = all.map(({ticker, data, grade}) => {
                    const rs    = data.rs_rank    ? `RS ${parseInt(data.rs_rank)}` : '';
                    const pivot = data.pivot_price ? `$${parseFloat(data.pivot_price).toFixed(2)}` : '';
                    const vcp   = data.vcp_grade && data.vcp_grade !== 'D' ? `VCP ${data.vcp_grade}` : '';
                    const sub   = [rs, pivot, vcp].filter(Boolean).join(' · ');
                    return `<a class="wl-row" onclick="go('/tg/analyze/${ticker}?strategy=SEPA')">
                        <div class="wl-grade grade-${grade}">${grade}</div>
                        <div>
                            <div style="font-size:14px;font-weight:700;color:var(--accent)">${ticker}</div>
                            ${sub ? `<div style="font-size:10px;color:var(--text-dim)">${sub}</div>` : ''}
                        </div>
                    </a>`;
                }).join('');
            } catch(e) {
                document.getElementById('watchlistBody').innerHTML = `<div class="empty-state">無法載入觀察清單</div>`;
            }
        }

        // Scan highlights
        async function loadScanHighlights() {
            try {
                const r = await fetch('/api/combined/scan/last').then(x => x.json());
                const sepaRows = (r.sepa_rows || []).slice(0, 5);
                const qmRows   = (r.qm_rows   || []).slice(0, 5);
                const mlData   = await fetch('/api/ml/scan/last').then(x => x.json());
                const mlRows   = (mlData.rows || []).slice(0, 5);

                const sepaBody = document.getElementById('sepaBody');
                if (sepaRows.length) {
                    sepaBody.innerHTML = sepaRows.map((s, i) => {
                        const score = s.total_score != null ? parseFloat(s.total_score).toFixed(1) : '—';
                        const sCls  = s.total_score >= 75 ? 'score-high' : s.total_score >= 55 ? 'score-mid' : 'score-low';
                        const rs    = s.rs_rank != null ? `RS ${parseInt(s.rs_rank)}` : '';
                        const vcp   = s.vcp_grade && s.vcp_grade !== 'D' ? `VCP ${s.vcp_grade}` : '';
                        const sub   = [s.sector||'', rs, vcp].filter(Boolean).join(' · ');
                        return `<a class="data-row" onclick="go('/tg/analyze/${s.ticker}?strategy=SEPA')">
                            <div class="row-rank">${i+1}</div>
                            <div style="margin-left:8px">
                                <div class="row-ticker">${s.ticker}</div>
                                ${sub ? `<div class="row-sub">${sub}</div>` : ''}
                            </div>
                            <div class="row-right"><div class="row-score ${sCls}">${score}</div></div>
                        </a>`;
                    }).join('');
                } else {
                    sepaBody.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div>暫無 SEPA 掃描結果</div>`;
                }

                const qmBody = document.getElementById('qmBody');
                if (qmRows.length) {
                    qmBody.innerHTML = qmRows.map((q, i) => {
                        const star  = parseFloat(q.qm_star ?? q.stars ?? 0);
                        const sCls  = star >= 5 ? 'score-high' : star >= 4 ? 'score-mid' : 'score-low';
                        const stars = '★'.repeat(Math.floor(star));
                        const adr   = q.adr != null ? `ADR ${parseFloat(q.adr).toFixed(1)}%` : '';
                        const sub   = [adr, q.setup_type||''].filter(Boolean).join(' · ');
                        return `<a class="data-row" onclick="go('/tg/analyze/${q.ticker}?strategy=QM')">
                            <div class="row-rank">${i+1}</div>
                            <div style="margin-left:8px">
                                <div class="row-ticker qm-color">${q.ticker}</div>
                                ${sub ? `<div class="row-sub">${sub}</div>` : ''}
                            </div>
                            <div class="row-right"><div class="row-score ${sCls}">${stars} ${star.toFixed(1)}</div></div>
                        </a>`;
                    }).join('');
                } else {
                    qmBody.innerHTML = `<div class="empty-state"><div class="empty-icon">⚡</div>暫無 QM 掃描結果</div>`;
                }

                const mlBody = document.getElementById('mlBody');
                if (mlRows.length) {
                    mlBody.innerHTML = mlRows.map((m, i) => {
                        const star = parseFloat(m.ml_star ?? m.stars ?? m.capped_stars ?? 0);
                        const sCls = star >= 5 ? 'score-high' : star >= 4 ? 'score-mid' : 'score-low';
                        const stars = '★'.repeat(Math.max(0, Math.floor(star)));
                        const adr = m.adr != null ? `ADR ${parseFloat(m.adr).toFixed(1)}%` : '';
                        const setup = m.setup_type || m.primary_setup || '';
                        const sub = [adr, setup].filter(Boolean).join(' · ');
                        return `<a class="data-row" onclick="go('/tg/analyze/${m.ticker}?strategy=ML')">
                            <div class="row-rank">${i + 1}</div>
                            <div style="margin-left:8px">
                                <div class="row-ticker" style="color:var(--green)">${m.ticker}</div>
                                ${sub ? `<div class="row-sub">${sub}</div>` : ''}
                            </div>
                            <div class="row-right"><div class="row-score ${sCls}">${stars} ${star.toFixed(1)}</div></div>
                        </a>`;
                    }).join('');
                } else {
                    mlBody.innerHTML = `<div class="empty-state"><div class="empty-icon">🟢</div>暫無 ML 掃描結果</div>`;
                }

            } catch(e) {
                document.getElementById('sepaBody').innerHTML = `<div class="empty-state">無法載入掃描結果</div>`;
                document.getElementById('qmBody').innerHTML  = `<div class="empty-state">無法載入掃描結果</div>`;
                document.getElementById('mlBody').innerHTML  = `<div class="empty-state">無法載入掃描結果</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadMarket();
            loadPositions();
            loadWatchlist();
            loadScanHighlights();
            const params = new URLSearchParams(window.location.search);
            const ticker = params.get('ticker');
            if (ticker) document.getElementById('tickerInput').value = ticker.toUpperCase();
        });
    </script>
</body>
</html>
