<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPA StockLab 菜單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d29922;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }
        
        .menu-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
        }
        
        .menu-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .menu-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 1rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 5rem;
        }
        
        .menu-item:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .menu-item.large {
            grid-column: 1 / -1;
            min-height: 4rem;
        }
        
        .menu-icon {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .menu-label {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.2;
        }
        
        .ticker-input-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .ticker-input-section h3 {
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            color: var(--accent);
        }
        
        .ticker-input-group {
            display: flex;
            gap: 0.5rem;
        }
        
        .ticker-input-group input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .ticker-input-group input::placeholder {
            color: #6e7681;
        }
        
        .ticker-input-group button {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .ticker-input-group button:hover {
            background: #1f6feb;
        }
        
        .ticker-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .ticker-button {
            padding: 0.5rem;
            font-size: 0.8rem;
            background: var(--bg-primary);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ticker-button:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 0.75rem;
            text-align: center;
            font-size: 0.75rem;
            color: #8b949e;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
            color: var(--accent);
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <!-- 標題 -->
        <div class="header">
            <h1>📊 SEPA StockLab</h1>
            <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem; color: #8b949e;">功能菜單</p>
        </div>
        
        <!-- 菜單內容 -->
        <div class="menu-content">
            <!-- 股票分析輸入 -->
            <div class="ticker-input-section">
                <h3>🔍 分析股票</h3>
                <div class="ticker-input-group">
                    <input type="text" id="tickerInput" placeholder="例: NVDA" maxlength="5">
                    <button onclick="quickAction('sepa')">SEPA</button>
                </div>
                <div class="ticker-actions">
                    <button class="ticker-button" onclick="quickAction('qm')">QM</button>
                    <button class="ticker-button" onclick="quickAction('ml')">ML</button>
                </div>
            </div>
            
            <!-- 市場信息 -->
            <div class="section-title">📈 市場信息</div>
            <div class="menu-grid">
                <a href="#" class="menu-item" onclick="navigate('market')">
                    <div class="menu-icon">🌍</div>
                    <div class="menu-label">市場環境</div>
                </a>
                <a href="#" class="menu-item" onclick="navigate('watchlist')">
                    <div class="menu-icon">⭐</div>
                    <div class="menu-label">觀察清單</div>
                </a>
            </div>
            
            <!-- 持倉管理 -->
            <div class="section-title">💼 持倉管理</div>
            <div class="menu-grid">
                <a href="#" class="menu-item" onclick="navigate('positions')">
                    <div class="menu-icon">📋</div>
                    <div class="menu-label">現有持倉</div>
                </a>
                <a href="/tg/trade" class="menu-item">
                    <div class="menu-icon">➕</div>
                    <div class="menu-label">新增交易</div>
                </a>
            </div>
            
            <!-- 全市場掃描 -->
            <div class="section-title">🚀 全市場掃描</div>
            <div class="menu-grid">
                <a href="#" class="menu-item" onclick="startScan('sepa')">
                    <div class="menu-icon">📡</div>
                    <div class="menu-label">SEPA</div>
                </a>
                <a href="#" class="menu-item" onclick="startScan('qm')">
                    <div class="menu-icon">⚡</div>
                    <div class="menu-label">QM</div>
                </a>
                <a href="#" class="menu-item" onclick="startScan('ml')">
                    <div class="menu-icon">📊</div>
                    <div class="menu-label">ML</div>
                </a>
            </div>
            
            <!-- 設置 -->
            <div class="section-title">⚙️ 設置</div>
            <div class="menu-grid">
                <a href="#" class="menu-item" onclick="navigate('account')">
                    <div class="menu-icon">👤</div>
                    <div class="menu-label">帳戶設置</div>
                </a>
                <a href="#" class="menu-item" onclick="showHelp()">
                    <div class="menu-icon">❓</div>
                    <div class="menu-label">幫助</div>
                </a>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 0.5rem;">處理中...</p>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>SEPA StockLab Telegram Mini App | 版本 1.0</p>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Telegram WebApp SDK
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function navigate(page) {
            window.location.href = `/tg/menu/${page}`;
        }
        
        function quickAction(strategy) {
            const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
            if (!ticker) {
                alert('請輸入股票代碼');
                return;
            }
            handleAnalyze(ticker, strategy);
        }
        
        async function handleAnalyze(ticker, strategy) {
            showLoading(true);
            try {
                const response = await fetch(`/api/tg/analyze/${ticker}?strategy=${strategy}`);
                const data = await response.json();
                
                if (data.error) {
                    alert(`❌ ${data.error}`);
                } else {
                    // 保存分析結果到localStorage或直接跳轉
                    sessionStorage.setItem('analysisResult', JSON.stringify(data));
                    window.location.href = `/tg/analyze/${ticker}?strategy=${strategy}`;
                }
            } catch (e) {
                alert(`❌ 分析失敗: ${e.message}`);
            } finally {
                showLoading(false);
            }
        }
        
        async function startScan(strategy) {
            const confirmed = confirm(`開始 ${strategy.toUpperCase()} 全市場掃描？\n（需要 5-30 分鐘，完成後會通知你）`);
            if (!confirmed) return;
            
            showLoading(true);
            try {
                const response = await fetch(`/api/${strategy}/run`, { method: 'POST' });
                const data = await response.json();
                
                if (data.job_id) {
                    alert(`✅ 掃描已開始！\nJob ID: ${data.job_id}\n完成後會通知你`);
                    window.location.href = `/tg/menu`;
                } else {
                    alert(`❌ 無法開始掃描`);
                }
            } catch (e) {
                alert(`❌ 錯誤: ${e.message}`);
            } finally {
                showLoading(false);
            }
        }
        
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('active');
            } else {
                loading.classList.remove('active');
            }
        }
        
        function showHelp() {
            const helpText = `📖 SEPA StockLab 菜單幫助

🔍 分析股票
輸入股票代碼 (例: NVDA) 並選擇分析策略：
• SEPA - Minervini 5 柱深度分析
• QM - Qullamaggie 6 星評級
• ML - Martin Luk 7 星評級

📈 市場信息
• 市場環境 - SPY/QQQ/IWM 市場狀態
• 觀察清單 - 你的 A/B/C 分級觀察清單

💼 持倉管理
• 現有持倉 - 顯示所有開放持倉

🚀 全市場掃描
選擇策略進行全市場掃描（需時 5-30 分鐘）

有問題？輸入 /help 查看命令`;
            alert(helpText);
        }
        
        // 頁面加載完成
        document.addEventListener('DOMContentLoaded', () => {
            // 如果有ticker在URL參數中，自動分析
            const params = new URLSearchParams(window.location.search);
            const ticker = params.get('ticker');
            if (ticker) {
                document.getElementById('tickerInput').value = ticker;
            }
        });
    </script>
</body>
</html>
